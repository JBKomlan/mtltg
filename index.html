<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransferLink - Console Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="logo-container">
        <span class="logo-text">TransferLink Admin</span>
    </div>

    <label>💰 Montant Initial (FCFA)</label>
    <input type="number" id="amount" placeholder="5000">

    <label>🔵 Numéro Mixx (T-Money)</label>
    <input type="text" id="n1" placeholder="90XXXXXX">

    <label>🟡 Numéro Flooz</label>
    <input type="text" id="n2" placeholder="96XXXXXX">

    <button onclick="requestLink()">Générer le lien sécurisé</button>

    <div id="result-area" style="display:none; margin-top:20px;">
        <input type="text" id="final-link" readonly>
        <button onclick="copyLink()">Copier le lien</button>
    </div>
</div>

<script>
    async function requestLink() {
        const payload = {
            mt: document.getElementById('amount').value,
            n1: document.getElementById('n1').value,
            n2: document.getElementById('n2').value,
            id1: "Client", // Optionnel
            id2: "Client"
        };

        const queryString = new URLSearchParams(payload).toString();
        
        // Appel à l'API de génération Vercel
        const response = await fetch(`/api/generate?${queryString}`);
        const data = await response.json();

        if(data.url) {
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-link').value = data.url;
        }
    }

    function copyLink() {
        const copyText = document.getElementById("final-link");
        copyText.select();
        document.execCommand("copy");
        alert("Lien copié !");
    }
</script>
</body>
</html>
